<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr Win - Online Prediction</title>
    <style>
        :root { --gold: #ffcc00; --dark: #111111; --card: #1e1e1e; --green: #00c853; --red: #d50000; --violet: #aa00ff; }
        body { font-family: 'Roboto', Arial, sans-serif; background: var(--dark); color: white; margin: 0; padding-bottom: 80px; }
        
        /* Header DK Win Style */
        .header { background: linear-gradient(180deg, var(--gold), #f39c12); color: #000; padding: 25px; text-align: center; border-radius: 0 0 30px 30px; font-weight: 900; font-size: 22px; box-shadow: 0 4px 15px rgba(243,156,18,0.4); }
        .balance-card { background: var(--card); margin: -20px 15px 15px; padding: 25px; border-radius: 20px; text-align: center; border: 1px solid #333; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        
        /* Game Section */
        .game-status { background: #222; margin: 15px; padding: 18px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--gold); }
        .timer-big { font-size: 40px; font-weight: bold; color: var(--gold); text-shadow: 0 0 10px rgba(255,204,0,0.4); }

        /* Color Buttons */
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; padding: 15px; }
        .btn-game { padding: 18px; border: none; border-radius: 12px; color: white; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.2s; }
        .bg-green { background: var(--green); } .bg-violet { background: var(--violet); } .bg-red { background: var(--red); }
        .btn-game:active { transform: scale(0.92); }

        /* Number Grid */
        .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 0 15px 15px; }
        .num-btn { background: #333; border: 1px solid #444; color: white; padding: 14px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .num-btn:active { background: var(--gold); color: #000; }

        /* History Balls */
        .record-section { margin: 15px; background: var(--card); padding: 15px; border-radius: 15px; }
        .ball-row { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; }
        .ball { min-width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }

        /* Deposit UI with Your Numbers */
        .recharge-box { background: var(--card); margin: 15px; padding: 25px; border-radius: 20px; border-top: 4px solid var(--gold); }
        .number-info { background: #2a2a2a; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-size: 13px; text-align: center; border: 1px dashed var(--gold); }
        input, select { width: 100%; padding: 15px; margin: 10px 0; background: #252525; border: 1px solid #444; color: white; border-radius: 12px; box-sizing: border-box; }
        .pay-btn { width: 100%; background: var(--gold); color: #000; padding: 18px; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 10px; }

        /* Bottom Menu */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; }
        .nav-link { color: #666; text-decoration: none; font-size: 12px; text-align: center; }
        .nav-link.active { color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">MR WIN OFFICIAL</div>

    <div class="balance-card">
        <small style="color:#888;">Wallet Balance (৳)</small>
        <h1 style="margin:8px 0; font-size: 38px;">৳ <span id="balance">1.22</span></h1>
        <div style="font-size: 13px; color: #555;">Account ID: 88704988</div>
    </div>

    <div class="game-status">
        <div>
            <span style="color: var(--gold); font-weight: bold; font-size: 18px;">WinGo 1Min</span><br>
            <small id="period" style="color:#777;">Period: 20260305105</small>
        </div>
        <div style="text-align: right;">
            <small style="color:#777;">Time Remaining</small>
            <div class="timer-big" id="timer">01:00</div>
        </div>
    </div>

    <div class="grid-3">
        <button class="btn-game bg-green" onclick="makeBet('Green')">Green</button>
        <button class="btn-game bg-violet" onclick="makeBet('Violet')">Violet</button>
        <button class="btn-game bg-red" onclick="makeBet('Red')">Red</button>
    </div>

    <div class="grid-5">
        <button class="num-btn" onclick="makeBet('0')">0</button>
        <button class="num-btn" onclick="makeBet('1')">1</button>
        <button class="num-btn" onclick="makeBet('2')">2</button>
        <button class="num-btn" onclick="makeBet('3')">3</button>
        <button class="num-btn" onclick="makeBet('4')">4</button>
        <button class="num-btn" onclick="makeBet('5')">5</button>
        <button class="num-btn" onclick="makeBet('6')">6</button>
        <button class="num-btn" onclick="makeBet('7')">7</button>
        <button class="num-btn" onclick="makeBet('8')">8</button>
        <button class="num-btn" onclick="makeBet('9')">9</button>
    </div>

    <div class="record-section">
        <div style="font-size: 14px; margin-bottom: 8px; color: var(--gold); font-weight: bold;">Game Records</div>
        <div class="ball-row">
            <div class="ball bg-green">5</div><div class="ball bg-red">2</div><div class="ball bg-violet">0</div><div class="ball bg-red">7</div><div class="ball bg-green">9</div><div class="ball bg-red">4</div>
        </div>
    </div>

    <div class="recharge-box">
        <h3 style="margin:0 0 15px; color: var(--gold); text-align: center;">Add Money</h3>
        <div class="number-info">
            Bkash (Personal): <b>01873046713</b><br>
            Nagad (Personal): <b>01863796311</b>
        </div>
        
        <form id="payForm">
            <select id="method">
                <option value="Bkash">Bkash</option>
                <option value="Nagad">Nagad</option>
            </select>
            <input type="number" id="amount" placeholder="Recharge Amount (৳)" required>
            <input type="text" id="trxid" placeholder="TrxID (Transaction ID)" required>
            <button type="submit" class="pay-btn">RECHARGE NOW</button>
        </form>
    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-link">Home</a>
        <a href="#" class="nav-link active">Win</a>
        <a href="#" class="nav-link">Account</a>
    </nav>

    <script>
        // --- 1. Timer logic ---
        let count = 60;
        setInterval(() => {
            count--;
            if(count < 0) count = 60;
            let m = Math.floor(count / 60);
            let s = count % 60;
            document.getElementById('timer').innerText = `0${m}:${s < 10 ? '0' : ''}${s}`;
        }, 1000);

        // --- 2. Telegram Integration ---
        const BOT_TOKEN = "8671186753:AAELrau3U2GHeoPjt41tMg6LaFX7vOojohM";
        const ADMIN_CHAT_ID = "আপনার_চ্যাট_আইডি_এখানে"; // টেলিগ্রাম আইডি এখানে দিন

        document.getElementById('payForm').onsubmit = function(e){
            e.preventDefault();
            const val_mtd = document.getElementById('method').value;
            const val_amt = document.getElementById('amount').value;
            const val_trx = document.getElementById('trxid').value;

            const text = `🚀 *Mr Win - New Deposit*\n\n💰 Amount: ৳${val_amt}\n💳 Method: ${val_mtd}\n🔢 TrxID: ${val_trx}\n👤 User: 88704988`;
            
            const btns = {
                inline_keyboard: [[
                    { text: "✅ Approve", callback_data: "y" },
                    { text: "❌ Reject", callback_data: "n" }
                ]]
            };

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_CHAT_ID}&text=${encodeURIComponent(text)}&parse_mode=Markdown&reply_markup=${JSON.stringify(btns)}`)
            .then(() => {
                alert("আপনার রিচার্জ রিকোয়েস্টটি পাঠানো হয়েছে। ৫ মিনিটের মধ্যে চেক করা হবে।");
                this.reset();
            });
        };

        function makeBet(v) {
            alert("আপনি " + v + " এর ওপর বেট ধরেছেন। রেজাল্ট পর্যন্ত অপেক্ষা করুন।");
        }
    </script>
</body>
</html>
