<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr Win - Complete System</title>
    <style>
        :root { --primary: #ffcc00; --dark: #121212; --card: #1e1e1e; --text: #ffffff; }
        body { font-family: 'Arial', sans-serif; background: #000; color: var(--text); margin: 0; padding-bottom: 80px; }
        
        /* User Header */
        .header { background: var(--primary); color: #000; padding: 25px 20px; text-align: center; border-radius: 0 0 25px 25px; font-weight: bold; }
        .balance-box { background: var(--card); margin: -20px 15px 15px; padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #333; }
        
        /* WinGo Game UI */
        .game-card { background: var(--card); margin: 15px; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--primary); }
        .timer-val { font-size: 32px; font-weight: bold; color: var(--primary); }

        /* Betting Buttons */
        .bet-area { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 15px; }
        .btn { padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        .green { background: #2e7d32; } .violet { background: #7b1fa2; } .red { background: #c62828; }

        /* Deposit System */
        .form-card { background: var(--card); margin: 15px; padding: 20px; border-radius: 15px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        .submit-btn { width: 100%; background: var(--primary); color: #000; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Footer Navigation */
        .footer { position: fixed; bottom: 0; width: 100%; background: #1a1a1a; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; }
        .footer-item { color: #888; text-decoration: none; font-size: 12px; text-align: center; }
        .footer-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0;">MR WIN</h2>
    </div>

    <div class="balance-box">
        <p style="color:#aaa; margin:0;">Account Balance</p>
        <h1 style="margin:10px 0;">৳ <span id="balance">1.22</span></h1>
        <div style="font-size: 13px; color: var(--primary);">Member ID: 704988</div>
    </div>

    <div class="game-card">
        <div>
            <strong>WinGo 1Min</strong><br>
            <small>Period: 20260305101</small>
        </div>
        <div style="text-align: right;">
            <small>Time Remaining</small>
            <div class="timer-val" id="timer">01:00</div>
        </div>
    </div>

    <div class="bet-area">
        <button class="btn green" onclick="play('Green')">Green</button>
        <button class="btn violet" onclick="play('Violet')">Violet</button>
        <button class="btn red" onclick="play('Red')">Red</button>
    </div>

    <div class="form-card">
        <h3 style="margin-top:0; color: var(--primary);">Add Funds</h3>
        <p style="font-size: 11px;">Bkash: <b>01873046713</b> | Nagad: <b>01863796311</b></p>
        
        <form id="depositForm">
            <select id="method">
                <option value="Bkash">Bkash</option>
                <option value="Nagad">Nagad</option>
            </select>
            <input type="number" id="amount" placeholder="Deposit Amount (৳)" required>
            <input type="text" id="trxid" placeholder="Transaction ID (TrxID)" required>
            <button type="submit" class="submit-btn">SUBMIT TO ADMIN</button>
        </form>
    </div>

    <div class="footer">
        <a href="#" class="footer-item">Home</a>
        <a href="#" class="footer-item">Win</a>
        <a href="#" class="footer-item">Activity</a>
        <a href="#" class="footer-item active">Account</a>
    </div>

    <script>
        // --- 1. Timer System ---
        let timeLeft = 60;
        const timerLabel = document.getElementById('timer');
        
        setInterval(() => {
            timeLeft--;
            if (timeLeft < 0) timeLeft = 60;
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            timerLabel.innerText = `0${m}:${s < 10 ? '0' : ''}${s}`;
        }, 1000);

        // --- 2. Telegram Control Integration ---
        // আপনার বোট টোকেন সেট করা আছে
        const BOT_TOKEN = "8671186753:AAELrau3U2GHeoPjt41tMg6LaFX7vOojohM";
        // এখানে আপনার চ্যাট আইডি বসান
        const MY_CHAT_ID = "আপনার_চ্যাট_আইডি_এখানে"; 

        document.getElementById('depositForm').onsubmit = function(e) {
            e.preventDefault();
            
            const method = document.getElementById('method').value;
            const amount = document.getElementById('amount').value;
            const trx = document.getElementById('trxid').value;

            const message = `🔔 *New Deposit Request*\n\n💰 Amount: ৳${amount}\n💳 Method: ${method}\n🔢 TrxID: ${trx}\n👤 UserID: 704988`;

            // কন্ট্রোল বাটন (Approve/Reject)
            const controlButtons = {
                inline_keyboard: [[
                    { text: "✅ Approve", callback_data: "app_704988" },
                    { text: "❌ Reject", callback_data: "rej_704988" }
                ]]
            };

            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${MY_CHAT_ID}&text=${encodeURIComponent(message)}&parse_mode=Markdown&reply_markup=${JSON.stringify(controlButtons)}`;

            fetch(url).then(res => {
                alert("আপনার রিকোয়েস্টটি অ্যাডমিনের কাছে পাঠানো হয়েছে।");
                this.reset();
            });
        };

        function play(color) {
            alert(color + " এ আপনার বেটটি সফল হয়েছে।");
        }
    </script>
</body>
</html>
